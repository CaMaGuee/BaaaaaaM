<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>BAAAAAAM</title>
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #unity-wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background: #000;
      }

      #unity-canvas {
        display: block;
        background: #231F20;
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
      }

      @media (orientation: portrait) {
        #unity-canvas {
          width: min(100vw, calc(100vh * 9 / 16));
          height: min(100vh, calc(100vw * 16 / 9));
        }
      }

      @media (orientation: landscape) {
        #unity-canvas {
          width: min(100vw, calc(100vh * 9 / 16));
          height: min(100vh, calc(100vw * 16 / 9));
        }
      }
    </style>
  </head>

  <body>
    <div id="unity-wrapper">
      <canvas id="unity-canvas" width="1080" height="1920" tabindex="-1"></canvas>
    </div>

    <script src="Build/Build.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/Build.data",
        frameworkUrl: "Build/Build.framework.js",
        codeUrl: "Build/Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "CaMaGuee",
        productName: "BAAAAAAM",
        productVersion: "1.0"
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
